<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Background glow blob -->
  <ellipse cx="900" cy="300" rx="340" ry="280" fill="url(#glowGrad)"/>
  <ellipse cx="150" cy="500" rx="200" ry="160" fill="#6366f1" fill-opacity="0.04"/>

  <!-- Outer border -->
  <rect x="24" y="24" width="1152" height="582" rx="20" fill="none" stroke="#1f2937" stroke-width="1.5"/>

  <!-- Decorative circle rings (right side) -->
  <circle cx="980" cy="315" r="220" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="980" cy="315" r="160" fill="none" stroke="#1f2937" stroke-width="1"/>
  <circle cx="980" cy="315" r="100" fill="none" stroke="#374151" stroke-width="1"/>
  <circle cx="980" cy="315" r="50" fill="none" stroke="#374151" stroke-width="1.5"/>
  <!-- Accent ring -->
  <circle cx="980" cy="315" r="220" fill="none" stroke="url(#accentGrad)" stroke-width="1" stroke-dasharray="4 12" opacity="0.4"/>

  <!-- Left vertical accent bar -->
  <rect x="72" y="190" width="3" height="200" rx="2" fill="url(#accentGrad)"/>

  <!-- FRONTEND DEVELOPER label -->
  <text x="95" y="232" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="400" fill="#6b7280" letter-spacing="5">FRONTEND DEVELOPER</text>

  <!-- Name (Korean) -->
  <text x="92" y="345" font-family="'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif" font-size="100" font-weight="700" fill="url(#nameGrad)">이 승 찬</text>

  <!-- Tagline -->
  <text x="95" y="398" font-family="'Malgun Gothic', '맑은 고딕', Arial, sans-serif" font-size="20" fill="#9ca3af">사용자 흐름을 이해하고, 직관적인 UI로 구현하는 개발자</text>

  <!-- Divider line -->
  <line x1="95" y1="422" x2="640" y2="422" stroke="#1f2937" stroke-width="1"/>

  <!-- Tech stack tags -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#9ca3af">
    <!-- React -->
    <rect x="95" y="436" width="80" height="30" rx="15" fill="none" stroke="#374151" stroke-width="1.2"/>
    <text x="135" y="456" text-anchor="middle">React</text>
    <!-- Next.js -->
    <rect x="185" y="436" width="84" height="30" rx="15" fill="none" stroke="#374151" stroke-width="1.2"/>
    <text x="227" y="456" text-anchor="middle">Next.js</text>
    <!-- Vue -->
    <rect x="279" y="436" width="64" height="30" rx="15" fill="none" stroke="#374151" stroke-width="1.2"/>
    <text x="311" y="456" text-anchor="middle">Vue</text>
    <!-- TypeScript -->
    <rect x="353" y="436" width="102" height="30" rx="15" fill="none" stroke="#374151" stroke-width="1.2"/>
    <text x="404" y="456" text-anchor="middle">TypeScript</text>
    <!-- Tailwind -->
    <rect x="465" y="436" width="116" height="30" rx="15" fill="none" stroke="#374151" stroke-width="1.2"/>
    <text x="523" y="456" text-anchor="middle">Tailwind CSS</text>
  </g>

  <!-- Bottom URL -->
  <text x="95" y="558" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#374151">portfolio-nine-murex-vtgmelanap.vercel.app</text>

  <!-- Dot accent -->
  <circle cx="95" cy="218" r="4" fill="#a78bfa" opacity="0.7"/>
</svg>
